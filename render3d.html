<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='0' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%23131c20'/%3E%3Cstop offset='1' stop-color='%23d27238'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='6' fill='url(%23g)'/%3E%3Ccircle cx='16' cy='20' r='5' fill='%23f5d8a8' opacity='0.9'/%3E%3C/svg%3E" />
    <title>WestWard — 3D First Road Slice</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: #1a1226; overflow: hidden; }
      #scene { display: block; width: 100vw; height: 100vh; }

      /* DOM objective strip — stays out of the 3D scene, low-chrome */
      #objective {
        position: fixed;
        left: 50%;
        bottom: 28px;
        transform: translateX(-50%);
        max-width: min(680px, 92vw);
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 20px;
        font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
        color: #f6e4c4;
        background: rgba(24, 16, 30, 0.72);
        border: 1px solid rgba(216, 168, 79, 0.55);
        border-radius: 10px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(4px);
        letter-spacing: 0.2px;
      }
      #objective .pip {
        width: 10px; height: 10px; border-radius: 50%;
        background: #ffd77b;
        box-shadow: 0 0 10px 2px rgba(255, 215, 123, 0.7);
        flex: none;
      }
      #objective .label { font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: #d8a84f; }
      #objective .text { font-size: 17px; display: block; margin-top: 3px; }
      #objective .meta {
        display: flex;
        gap: 8px;
        margin-top: 6px;
        flex-wrap: wrap;
        font-size: 11px;
        color: #e6ca97;
        opacity: 0.9;
      }
      #objective .meta span {
        padding: 3px 8px;
        border: 1px solid rgba(216, 168, 79, 0.4);
        border-radius: 999px;
      }

      #tag {
        position: fixed; top: 14px; left: 16px;
        font: 12px/1.4 ui-monospace, monospace;
        color: rgba(246, 228, 196, 0.6);
        background: rgba(24, 16, 30, 0.5);
        padding: 6px 10px; border-radius: 6px;
      }

      /* Interaction prompt — sits just above the objective strip, smaller. */
      #prompt {
        position: fixed;
        left: 50%;
        bottom: 96px;
        transform: translateX(-50%);
        font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
        font-size: 15px;
        letter-spacing: 0.3px;
        color: #f6e4c4;
        background: rgba(24, 16, 30, 0.78);
        border: 1px solid rgba(216, 168, 79, 0.7);
        border-radius: 8px;
        padding: 8px 14px;
        box-shadow: 0 6px 22px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(3px);
        pointer-events: none;
        /* Above the vignette overlay (z=10) so prompt text isn't dimmed. */
        z-index: 20;
      }
      #prompt[hidden] { display: none; }

      #board-modal[hidden] { display: none; }
      #board-modal {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: grid;
        place-items: center;
        background: rgba(6, 3, 12, 0.58);
        backdrop-filter: blur(5px);
        font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
      }
      #board-card {
        width: min(520px, 92vw);
        padding: 22px;
        color: #f6e4c4;
        background: linear-gradient(180deg, rgba(43, 27, 31, 0.96), rgba(18, 13, 24, 0.96));
        border: 1px solid rgba(216, 168, 79, 0.72);
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.62);
      }
      #board-card h2 {
        margin: 0 0 8px;
        font-size: 24px;
        letter-spacing: 0.3px;
      }
      #board-card p {
        margin: 8px 0;
        color: #dac6a5;
        line-height: 1.45;
      }
      #board-card .reward {
        color: #ffd77b;
      }
      #board-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 18px;
      }
      #board-actions button {
        cursor: pointer;
        border: 1px solid rgba(216, 168, 79, 0.7);
        border-radius: 8px;
        padding: 9px 14px;
        color: #f6e4c4;
        background: rgba(85, 54, 28, 0.8);
        font: inherit;
      }
      #board-actions button.secondary {
        background: rgba(20, 13, 24, 0.8);
        color: #cdb992;
      }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div id="tag" aria-hidden="true">WestWard · Dustward · 3D first road</div>
    <div id="prompt" role="status" aria-live="polite" hidden></div>
    <div id="objective">
      <span class="pip"></span>
      <span>
        <span class="label">Objective</span><br />
        <span class="text">Open Boone's board — accept the Marsh Slime Bounty.</span>
        <div class="meta" aria-live="polite"></div>
      </span>
    </div>
    <div id="board-modal" hidden>
      <div id="board-card" role="dialog" aria-modal="true" aria-labelledby="board-title">
        <h2 id="board-title">Marsh Slime Bounty</h2>
        <p>Smoke Cache is spitting green light again. Boone wants the road cleared before more cargo goes missing.</p>
        <p class="reward">Reward: +38g, +18 XP, Old Road Survey lead</p>
        <div id="board-actions">
          <button id="board-close" class="secondary" type="button">Not yet</button>
          <button id="board-accept" type="button">Accept bounty</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/render3d/spike.js"></script>
  </body>
</html>
