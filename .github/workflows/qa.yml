name: QA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs of this workflow on the same ref.
concurrency:
  group: qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: Fast gates (typecheck + unit tests + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck:ts

      - name: Syntax check (harness scripts)
        run: npm run test:syntax

      - name: Lint (dev_tools.sh lint)
        run: npm run dev:lint

      - name: Unit + system tests (vitest)
        run: npm test

      - name: Production build (Vite)
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 7

  smoke:
    name: 3D first-road smoke + golden-image gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: fast
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run 3D first-road smoke and screenshot gate
        run: |
          npm run dev -- --host 127.0.0.1 --port 5180 > /tmp/westward-render3d.log 2>&1 &
          SERVER_PID=$!
          cleanup() {
            kill "$SERVER_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:5180/ >/dev/null; then
              WESTWARD_URL=http://127.0.0.1:5180 npm run test:render3d
              WESTWARD_URL=http://127.0.0.1:5180 npm run test:visual
              exit 0
            fi
            if ! kill -0 "$SERVER_PID" >/dev/null 2>&1; then
              cat /tmp/westward-render3d.log
              exit 1
            fi
            sleep 0.5
          done

          cat /tmp/westward-render3d.log
          exit 1

      - name: Upload smoke artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-artifacts
          path: output
          retention-days: 14
          if-no-files-found: ignore
