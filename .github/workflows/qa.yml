name: QA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs of the same workflow on the same ref.
# Static group name avoids any expression interpolation.
concurrency:
  group: qa
  cancel-in-progress: true

jobs:
  fast:
    name: Fast gates (typecheck + unit tests + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck:ts

      - name: Syntax check (playwright client)
        run: npm run test:syntax

      - name: Lint (dev_tools.sh lint)
        run: npm run dev:lint

      - name: Unit + system tests (vitest)
        run: npm test

      - name: Production build (Vite)
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 7

  smoke:
    name: Smoke suite (Playwright scripted replays)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: fast
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke suite
        run: npm run test:smoke

      - name: Upload smoke artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-artifacts
          path: output
          retention-days: 14
          if-no-files-found: ignore
